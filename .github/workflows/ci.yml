name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ticketing_test
          POSTGRES_USER: ticketing_user
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://ticketing_user:testpass@localhost:5432/ticketing_test
      SECRET_KEY: ci-test-secret-key-not-real
      FLASK_ENV: testing
      FLASK_APP: wsgi.py
      MAIL_SUPPRESS_SEND: "1"
      SCHEDULER_API_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run DB migrations
        run: flask db upgrade
      - name: Lint
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --extend-ignore=E501,W503 || true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/ticketing-support
            git pull https://github.com/IntermedicHCIS/ticketing-support.git main
            docker compose -f docker-compose.prod.yml build --no-cache web
            docker compose -f docker-compose.prod.yml up -d --no-deps web
            echo "Deployment complete at $(date)"

# Production Docker Compose for Ticketing-Intermedic
# NOTE: Nginx runs on the HOST (not in Docker) so that certbot SSL certs are accessible.
#       Port 5000 is bound to 127.0.0.1 only — nginx proxies from the host into the container.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ticketing_db
      POSTGRES_USER: ticketing_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pgdata_backup:/var/lib/postgresql/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing_user -d ticketing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ticketing_user:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/ticketing_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLASK_ENV: production
      FLASK_APP: wsgi.py
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:5000:5000"
    command: >
      sh -c "flask db upgrade && gunicorn -c gunicorn.conf.py wsgi:app"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ticketing_user:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/ticketing_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLASK_APP: wsgi.py
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    command: celery -A wsgi.celery worker --loglevel=info --concurrency=2
    networks:
      - internal

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ticketing_user:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@db:5432/ticketing_db
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLASK_APP: wsgi.py
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A wsgi.celery beat --loglevel=info
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
  pgdata_backup:
    driver: local
  uploads:
    driver: local

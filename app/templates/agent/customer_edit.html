{% extends 'base_agent.html' %}
{% block title %}Edit Customer{% endblock %}
{% block page_title %}Edit Customer{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
    <h2 class="text-base font-semibold text-slate-800 mb-5">Edit customer profile</h2>
    <form method="POST" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="next" value="{{ request.referrer or '' }}">

      <div class="mb-4">
        <label class="block text-sm font-medium text-slate-700 mb-1.5" for="name">Full name</label>
        <input id="name" name="name" type="text" value="{{ customer.name }}" required
               class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-slate-700 mb-1.5" for="email">Email address</label>
        <input id="email" name="email" type="email" value="{{ customer.email }}" required
               class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary">
        <p class="text-xs text-slate-400 mt-1">This is the address used for login and all ticket notifications.</p>
      </div>

      <div class="flex items-center gap-3">
        <button type="submit"
                class="bg-primary hover:bg-primary-dark text-white font-semibold px-5 py-2 rounded-lg text-sm transition-colors">
          Save changes
        </button>
        <a href="{{ request.referrer or url_for('agent.tickets') }}"
           class="text-sm text-slate-500 hover:text-slate-800 transition-colors">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;background:#f8fafc;margin:0;padding:20px;">
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;">
  <div style="background:#1B4F8A;padding:24px 28px;">
    <h1 style="color:#fff;margin:0;font-size:18px;font-weight:600;">Ticket Update</h1>
    <p style="color:#93c5fd;margin:4px 0 0;font-size:14px;">{{ event }}</p>
  </div>
  <div style="padding:28px;">
    <div style="background:#f1f5f9;border-radius:6px;padding:16px;margin:0 0 20px;">
      <p style="margin:0 0 6px;color:#64748b;font-size:13px;">Reference</p>
      <p style="margin:0 0 12px;font-weight:600;color:#1e293b;font-family:monospace;">{{ ticket.ref }}</p>
      <p style="margin:0 0 6px;color:#64748b;font-size:13px;">Subject</p>
      <p style="margin:0 0 12px;color:#1e293b;">{{ ticket.subject }}</p>
      <p style="margin:0 0 6px;color:#64748b;font-size:13px;">Hospital</p>
      <p style="margin:0 {% if actor_name %}0 12px{% else %}0{% endif %};color:#1e293b;">{{ ticket.hospital.name if ticket.hospital else '—' }}</p>
      {% if actor_name %}
      <p style="margin:0 0 6px;color:#64748b;font-size:13px;">By</p>
      <p style="margin:0;color:#1e293b;">{{ actor_name }}</p>
      {% endif %}
    </div>
    <a href="{{ ticket_url }}" style="display:inline-block;background:#1B4F8A;color:#fff;text-decoration:none;padding:10px 22px;border-radius:6px;font-size:14px;font-weight:600;">View Ticket</a>
  </div>
  <div style="background:#f8fafc;padding:16px 28px;border-top:1px solid #e2e8f0;">
    <p style="margin:0;color:#94a3b8;font-size:12px;">Intermedic Support — {{ ticket_url }}</p>
  </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;padding:20px;color:#333;">
  <div style="background:#1B4F8A;padding:20px;border-radius:8px 8px 0 0;">
    <h2 style="color:white;margin:0;font-size:18px;">Update on Your Ticket</h2>
    <p style="color:#93c5fd;margin:4px 0 0;font-size:14px;">{{ ticket.ref }}</p>
  </div>
  <div style="border:1px solid #e2e8f0;border-top:none;padding:24px;border-radius:0 0 8px 8px;">
    <p style="margin:0 0 8px;font-weight:bold;color:#1e293b;">{{ ticket.subject }}</p>
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;">
    <p style="white-space:pre-wrap;color:#334155;line-height:1.6;">{{ message.body }}</p>
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;">
    <a href="{{ ticket_url }}"
       style="background:#1B4F8A;color:white;padding:12px 24px;text-decoration:none;border-radius:6px;display:inline-block;font-weight:bold;">
      View &amp; Reply
    </a>
    <p style="color:#94a3b8;font-size:12px;margin-top:16px;">
      You can also reply directly to this email to respond to the ticket.
    </p>
  </div>
  <p style="color:#999;font-size:12px;margin-top:16px;text-align:center;">Intermedic Support Desk</p>
</body>
</html>

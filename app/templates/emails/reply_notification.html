<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;background:#f8fafc;margin:0;padding:20px;">
<div style="max-width:560px;margin:0 auto;background:#fff;border-radius:8px;border:1px solid #e2e8f0;overflow:hidden;">
  <div style="background:#1B4F8A;padding:24px 28px;">
    <h1 style="color:#fff;margin:0;font-size:18px;font-weight:600;">Update on Your Ticket</h1>
    <p style="color:#93c5fd;margin:4px 0 0;font-size:14px;">{{ ticket.ref }}</p>
  </div>
  <div style="padding:28px;">
    <p style="color:#374151;margin:0 0 4px;font-weight:600;">{{ ticket.subject }}</p>
    {% if ticket.product %}<p style="color:#94a3b8;font-size:12px;margin:0 0 8px;">{{ ticket.product.name }}</p>{% endif %}
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:16px 0;">
    <p style="white-space:pre-wrap;color:#334155;line-height:1.6;margin:0 0 20px;">{{ message.body }}</p>
    <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 20px;">
    <a href="{{ ticket_url }}" style="display:inline-block;background:#1B4F8A;color:#fff;text-decoration:none;padding:10px 22px;border-radius:6px;font-size:14px;font-weight:600;">View &amp; Reply</a>
    <p style="color:#94a3b8;font-size:12px;margin:16px 0 0;">You can also reply directly to this email to respond to the ticket.</p>
  </div>
  <div style="background:#f8fafc;padding:16px 28px;border-top:1px solid #e2e8f0;">
    <p style="margin:0;color:#94a3b8;font-size:12px;">Intermedic Support — {{ ticket_url }}</p>
  </div>
</div>
</body>
</html>

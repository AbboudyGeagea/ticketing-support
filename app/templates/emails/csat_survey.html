<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>How did we do?</title></head>
<body style="font-family: Arial, sans-serif; background:#f8fafc; margin:0; padding:20px;">
<div style="max-width:560px; margin:0 auto; background:#fff; border-radius:8px; border:1px solid #e2e8f0; overflow:hidden;">
  <div style="background:#00A651; padding:24px 28px;">
    <h1 style="color:#fff; margin:0; font-size:18px; font-weight:600;">How did we do?</h1>
  </div>
  <div style="padding:28px; text-align:center;">
    <p style="color:#374151; margin:0 0 8px;">Hi {{ ticket.creator.name }}, your ticket <strong>{{ ticket.ref }}</strong> has been closed.</p>
    <p style="color:#374151; margin:0 0 24px;">We'd love your feedback &mdash; it takes just one click:</p>
    <div style="margin:0 0 24px;">
      <a href="{{ feedback_url }}?rating=5" style="display:inline-block; font-size:24px; text-decoration:none; margin:0 6px;" title="Excellent">&#11088;&#11088;&#11088;&#11088;&#11088;</a>
    </div>
    <div style="display:flex; justify-content:center; gap:10px; margin:0 0 24px;">
      <a href="{{ feedback_url }}?rating=5" style="background:#10B981; color:#fff; text-decoration:none; padding:8px 16px; border-radius:6px; font-size:13px;">&#128522; Excellent</a>
      <a href="{{ feedback_url }}?rating=3" style="background:#F59E0B; color:#fff; text-decoration:none; padding:8px 16px; border-radius:6px; font-size:13px;">&#128528; OK</a>
      <a href="{{ feedback_url }}?rating=1" style="background:#EF4444; color:#fff; text-decoration:none; padding:8px 16px; border-radius:6px; font-size:13px;">&#128542; Poor</a>
    </div>
    <p style="color:#94a3b8; font-size:12px;">Or <a href="{{ feedback_url }}" style="color:#00A651;">leave detailed feedback</a></p>
  </div>
</div>
</body>
</html>
